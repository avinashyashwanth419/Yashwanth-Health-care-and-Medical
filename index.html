<!DOCTYPE html>
<html>
<head>
    <title>Personalized Treatment Plan</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 30px; background-color: #f5f5f5; }
        .warning { color: red; font-weight: bold; }
        .chart-container { width: 100%; max-width: 500px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Personalized Treatment Recommendation Engine</h1>

        <div class="mb-3">
            <label>Age:</label>
            <input id="age" class="form-control" type="number" placeholder="Enter age">
        </div>

        <div class="mb-3">
            <label>Conditions (comma separated):</label>
            <input id="conditions" class="form-control" placeholder="e.g., diabetes, hypertension">
        </div>

        <div class="mb-3">
            <label>Current Medications (comma separated):</label>
            <input id="medications" class="form-control" placeholder="e.g., Metformin, ACE Inhibitor">
        </div>

        <div class="mb-3">
            <label>Genetic Risk (0-1):</label>
            <input id="genetic" class="form-control" type="number" step="0.01" placeholder="e.g., 0.7">
        </div>

        <button class="btn btn-primary" onclick="getPlan()">Generate Plan</button>

        <div class="mt-4">
            <h3>Recommended Treatments:</h3>
            <ul id="treatments" class="list-group"></ul>

            <h3 class="mt-3">Interaction Warnings:</h3>
            <ul id="warnings" class="list-group"></ul>

            <h3 class="mt-3">Risk Score:</h3>
            <div class="chart-container">
                <canvas id="riskChart"></canvas>
            </div>
            <p id="explanation" class="mt-2"></p>
        </div>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
